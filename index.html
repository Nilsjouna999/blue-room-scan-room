<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blue Room — Scan Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="reveal/reveal.css" />
  <link rel="stylesheet" href="arcane.css" />
  <link rel="stylesheet" href="arcana-profile.css" />
  <link rel="stylesheet" href="ceremony.css" />
</head>
<body data-treatment="free" data-view="menu">
  <!-- DEV NAV — dev-only state jumper. Hidden by default; revealed ONLY when the
       URL carries ?devnav=1 (app.js sets body[data-devnav="1"] + fills/unhides it).
       State navigation only — never shown to a real user, never a product control. -->
  <nav class="devnav" id="devnav" hidden aria-label="Dev navigation"></nav>

  <!-- MAIN MENU (front door) — one existing sample (SRC-01) shown as
       Free Pull vs Halo Mint. Rendered by app.js into #menuView; shown
       only when the URL has no scan-room params (deep links bypass it). -->
  <section class="menu" id="menuView"></section>

  <!-- LOCAL DRAFT intake — a browser-local preview of a user-chosen photo.
       No upload, no storage, no analysis. Rendered into #draftView by
       app.js; reached only when the user picks a file (never via URL). -->
  <section class="draft" id="draftView"></section>
  <input type="file" id="draftFile" accept="image/*" hidden aria-hidden="true" />

  <!-- DEV HARNESS — future uploaded-scan-result renderer. Reachable ONLY via
       ?dev=uploaded-result | ?dev=uploaded-blocked. Renders a VALIDATED dev
       fixture (never a user scan, never the local draft). app.js fills it. -->
  <section class="dev" id="devView"></section>

  <header class="topbar">
    <div class="brand">
      <span class="brand__hit" data-view-to="menu" role="button" tabindex="0" title="Back to main menu">
        <span class="brand__mark">◆</span>
        <span class="brand__name">BLUE ROOM</span>
      </span>
      <span class="brand__sub" id="zoneLabel">ARCHIVE · SCAN ROOM</span>
    </div>

    <div class="toggle" id="sourceToggle" role="tablist" aria-label="Scan source">
      <button type="button" data-source="0" class="toggle__btn is-active">SRC 01 · Driver</button>
      <button type="button" data-source="1" class="toggle__btn">SRC 02 · Ice Field</button>
    </div>

    <div class="toggle toggle--treatment" id="treatmentToggle" role="tablist" aria-label="Treatment">
      <button type="button" data-treatment="free" class="toggle__btn is-active">Free Pull</button>
      <button type="button" data-treatment="shiny" class="toggle__btn toggle__btn--shiny">Halo Mint</button>
    </div>
  </header>

  <main class="room">
    <aside class="panel panel--source" id="sourcePanel"></aside>
    <section class="stagezone" id="stageZone"></section>
    <aside class="panel panel--reading" id="readingPanel"></aside>
  </main>

  <section class="dossier" id="dossierMount"></section>

  <!-- Mint Record showcase scrim (BR-S123) — body-level blur layer. The card's
       "Mint Record" link adds body.is-mint-showcase: this scrim blurs the page and the
       real .dplate--mint fixes to mid-screen above it; clicking the scrim dismisses. -->
  <div class="mintscrim" id="mintScrim" data-mint-dismiss aria-hidden="true"></div>

  <!-- Source lightbox — body-level so it escapes panel overflow; opened from the
       Source tab photo, closed by the X / backdrop / Esc. Image src set on open. -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox__backdrop" data-lightbox-close></div>
    <figure class="lightbox__fig">
      <img class="lightbox__img" id="lightboxImg" alt="" />
      <button type="button" class="lightbox__x" data-lightbox-close aria-label="Close">×</button>
    </figure>
  </div>

  <footer class="hint"><button type="button" class="hint__back" data-view-to="menu">↑&nbsp;Menu</button>1 / 2 switch source &nbsp;·&nbsp; F free · H halo mint &nbsp;·&nbsp; M lab state</footer>

  <script src="data.js"></script>
  <!-- Scan Contract: pure non-AI validator + safe blocked-state shape for a
       FUTURE uploaded-photo engine. Exposes window.BlueRoomScanContract.
       Loaded before app.js; not run against the local draft (no engine yet). -->
  <script src="scan-contract.js"></script>
  <!-- Staged Card Reveal (BR-S124) — isolated dev surface on ?dev=staged-reveal.
       Loaded BEFORE app.js so window.BRReveal exists when app boots and
       mountDev() hands it the host. Units call the global renderCard (defined
       by app.js, present by mount time). Self-contained — touches nothing live. -->
  <script src="reveal/readings.data.js"></script>
  <script src="reveal/arrow-button.js"></script>
  <script src="reveal/card-frame.js"></script>
  <script src="reveal/reading-panel.js"></script>
  <script src="reveal/warning-modal.js"></script>
  <script src="reveal/stage-controller.js"></script>
  <!-- The Arcana Intake (BR-S159) — "The Setting of Marks". Isolated dev
       surface on ?dev=arcane; exposes window.BRArcane, mounted by app.js
       mountDev(). Self-contained (crown blueprint + forging ceremony). -->
  <script src="arcane.js"></script>
  <!-- The Arcana Reading — the illuminated dossier, crowned by a reliquary
       (?dev=arcana-reading). The name engine must load FIRST: the reading asks
       it for the crown's name + derivation. -->
  <script src="arcana-name-engine.js"></script>
  <script src="arcana-reading.js"></script>
  <!-- The Profile / Hub (?dev=profile) — the seeker's home: crown, vault, people,
       doors out. Static design surface, mocked commerce. window.BRArcanaProfile. -->
  <script src="arcana-profile.js"></script>
  <!-- The Ceremony (BR-S163) — the forge ceremony on ?dev=ceremony; the builder's
       exact art kept pixel-perfect + brought to life. window.BRCeremony. -->
  <script src="ceremony.js"></script>
  <script src="app.js"></script>
</body>
</html>
